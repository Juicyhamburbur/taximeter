<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="TaxiMeter" />
  <meta name="theme-color" content="#111111" />
  <title>TaxiMeter</title>
  <link rel="manifest" href="manifest.json" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #fff;
      font-family: monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 40px 24px 50px;
    }

    h1 {
      font-size: 14px;
      letter-spacing: 6px;
      color: #888;
      text-transform: uppercase;
    }

    .fare-block { text-align: center; }
    .fare-label { font-size: 12px; color: #666; letter-spacing: 4px; margin-bottom: 10px; }
    .fare       { font-size: 72px; color: #ffb300; }

    .stats { width: 100%; display: flex; flex-direction: column; gap: 12px; }

    .stat {
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      padding: 12px 16px;
      background: #1e1e1e;
      border-radius: 8px;
    }
    .stat-label { color: #888; }
    .stat-value { color: #fff; }

    .status             { font-size: 12px; letter-spacing: 4px; color: #555; }
    .status.running     { color: #00e676; }
    .status.ended       { color: #ffb300; }

    button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 10px;
      font-family: monospace;
      font-size: 16px;
      letter-spacing: 3px;
      cursor: pointer;
    }

    #btnStart { background: #00e676; color: #000; }
    #btnEnd   { background: #ff1744; color: #fff; display: none; }

    .ended-block { display: none; width: 100%; text-align: center; }
    .ended-block p { color: #00e676; font-size: 12px; letter-spacing: 4px; margin-bottom: 14px; }
    #btnNew { background: #ffb300; color: #000; }

    .gps-error {
      display: none;
      width: 100%;
      padding: 12px;
      background: #330000;
      border: 1px solid #ff1744;
      border-radius: 8px;
      font-size: 13px;
      color: #ff6666;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <h1>Taximeter</h1>

  <div class="fare-block">
    <div class="fare-label">FARE</div>
    <div class="fare" id="fare">£0.00</div>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-label">Distance</span>
      <span class="stat-value" id="dist">0.00 mi</span>
    </div>
    <div class="stat">
      <span class="stat-label">Rate / mile</span>
      <span class="stat-value" id="rate">£2.50</span>
    </div>
    <div class="stat">
      <span class="stat-label">Base fare</span>
      <span class="stat-value" id="base">£3.00</span>
    </div>
  </div>

  <div class="status" id="status">READY</div>

  <div class="gps-error" id="gpsError">
    Location access denied.<br>
    Settings → Safari → Location → Allow
  </div>

  <button id="btnStart">START TRIP</button>
  <button id="btnEnd">END TRIP</button>

  <div class="ended-block" id="endedBlock">
    <p>TRIP COMPLETE</p>
    <button id="btnNew">NEW TRIP</button>
  </div>

  <script>
    const BASE_FARE     = 3.00;
    const RATE_PER_MILE = 2.50;

    let fare      = 0;
    let distMiles = 0;
    let watchId   = null;
    let prevPos   = null;

    const fareEl   = document.getElementById('fare');
    const distEl   = document.getElementById('dist');
    const rateEl   = document.getElementById('rate');
    const baseEl   = document.getElementById('base');
    const statusEl = document.getElementById('status');
    const gpsErr   = document.getElementById('gpsError');
    const btnStart = document.getElementById('btnStart');
    const btnEnd   = document.getElementById('btnEnd');
    const endedBlk = document.getElementById('endedBlock');
    const btnNew   = document.getElementById('btnNew');

    rateEl.textContent = '£' + RATE_PER_MILE.toFixed(2);
    baseEl.textContent = '£' + BASE_FARE.toFixed(2);

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 +
                Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
                Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function onPosition(pos) {
      gpsErr.style.display = 'none';
      const { latitude: lat, longitude: lon, accuracy } = pos.coords;
      if (accuracy > 40) return;
      if (prevPos) {
        const metres = haversine(prevPos.lat, prevPos.lon, lat, lon);
        distMiles += metres / 1609.344;
        fare = BASE_FARE + distMiles * RATE_PER_MILE;
        fareEl.textContent = '£' + fare.toFixed(2);
        distEl.textContent = distMiles.toFixed(2) + ' mi';
      }
      prevPos = { lat, lon };
    }

    function onError(err) {
      if (err.code === 1) {
        gpsErr.style.display = 'block';
        stopTrip();
      }
    }

    function startTrip() {
      fare = BASE_FARE;
      distMiles = 0;
      prevPos = null;

      fareEl.textContent = '£' + fare.toFixed(2);
      distEl.textContent = '0.00 mi';

      watchId = navigator.geolocation.watchPosition(onPosition, onError, {
        enableHighAccuracy: true,
        maximumAge: 1000,
        timeout: 10000
      });

      btnStart.style.display = 'none';
      btnEnd.style.display   = 'block';
      endedBlk.style.display = 'none';

      statusEl.textContent = 'RUNNING';
      statusEl.className   = 'status running';
    }

    function stopTrip() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      btnEnd.style.display   = 'none';
      btnStart.style.display = 'none';
      endedBlk.style.display = 'block';

      statusEl.textContent = 'ENDED';
      statusEl.className   = 'status ended';
    }

    function resetTrip() {
      fare = 0;
      distMiles = 0;
      prevPos = null;

      fareEl.textContent = '£0.00';
      distEl.textContent = '0.00 mi';

      endedBlk.style.display = 'none';
      btnStart.style.display = 'block';

      statusEl.textContent = 'READY';
      statusEl.className   = 'status';
    }

    btnStart.addEventListener('click', startTrip);
    btnEnd.addEventListener('click', stopTrip);
    btnNew.addEventListener('click', resetTrip);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
